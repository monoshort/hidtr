<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1e8449"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold">De mens volgens Johan O. Smith</text>
  <text x="360" y="58" text-anchor="middle" font-size="13" fill="#555">Geest ť Ziel ť Lichaam (naar Hebr. 4:12)</text>

  <!-- GEEST - above head -->
  <ellipse cx="360" cy="118" rx="95" ry="42" fill="#eaf2f8" stroke="#2e86c1" stroke-width="2.5"/>
  <text x="360" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a5276">GEEST (pneuma)</text>
  <text x="360" y="128" text-anchor="middle" font-size="11" fill="#1a5276">Godsbewustzijn ť verbinding met God</text>

  <!-- God -->
  <text x="360" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e86c1">GOD</text>
  <line x1="360" y1="82" x2="360" y2="76" stroke="#2e86c1" stroke-width="1.5"/>
  <line x1="360" y1="160" x2="360" y2="195" stroke="#2e86c1" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Stick head / large circle = ZIEL -->
  <circle cx="360" cy="310" r="115" fill="#fff" stroke="#333" stroke-width="3"/>

  <!-- Upper half ZIEL = verstand -->
  <line x1="245" y1="310" x2="475" y2="310" stroke="#333" stroke-width="1.5"/>
  <text x="360" y="248" text-anchor="middle" font-size="15" font-weight="bold">ZIEL  verstand</text>
  <text x="360" y="268" text-anchor="middle" font-size="11" fill="#555">(psyche ť zelfbewustzijn)</text>

  <!-- Senses on top -->
  <text x="245" y="218" font-size="10" fill="#555">Zien</text>
  <line x1="270" y1="222" x2="300" y2="200" stroke="#333"/>
  <text x="310" y="205" font-size="10" fill="#555">Horen</text>
  <line x1="335" y1="210" x2="350" y2="195" stroke="#333"/>
  <text x="360" y="195" text-anchor="middle" font-size="10" fill="#555">Ruiken</text>
  <line x1="385" y1="210" x2="370" y2="195" stroke="#333"/>
  <text x="400" y="205" font-size="10" fill="#555">Proeven</text>
  <line x1="425" y1="222" x2="395" y2="200" stroke="#333"/>
  <text x="455" y="218" font-size="10" fill="#555">Voelen</text>
  <line x1="450" y1="222" x2="420" y2="200" stroke="#333"/>

  <!-- Conscious area cloud - fallen path -->
  <ellipse cx="360" cy="285" rx="78" ry="22" fill="none" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="360" y="282" text-anchor="middle" font-size="9" fill="#c0392b">verzoeking via verstand</text>
  <text x="360" y="294" text-anchor="middle" font-size="9" fill="#c0392b">"gij zult als God zijn"</text>

  <!-- Lower half ZIEL = wil -->
  <text x="360" y="338" text-anchor="middle" font-size="14" font-weight="bold">ZIEL — wil</text>
  <text x="360" y="358" text-anchor="middle" font-size="11" fill="#555">kiest: geest OF vlees</text>
  <text x="360" y="378" text-anchor="middle" font-size="10" fill="#c0392b" font-style="italic">gedachten roeren gevoelens</text>
  <text x="360" y="392" text-anchor="middle" font-size="10" fill="#c0392b" font-style="italic">(zielse wijsheid ť Jak. 3:15)</text>

  <!-- Connector to body -->
  <line x1="360" y1="425" x2="360" y2="490" stroke="#333" stroke-width="3"/>

  <!-- Small circle = LICHAAM -->
  <circle cx="360" cy="540" r="52" fill="#fdf2e9" stroke="#d35400" stroke-width="2.5"/>
  <text x="360" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#a04000">LICHAAM</text>
  <text x="360" y="544" text-anchor="middle" font-size="10" fill="#a04000">(sarx ť vlees)</text>
  <text x="360" y="560" text-anchor="middle" font-size="9" fill="#a04000">begeerte veroorzaakt</text>
  <text x="360" y="572" text-anchor="middle" font-size="9" fill="#a04000">werken van het vlees</text>

  <!-- Stick limbs -->
  <line x1="360" y1="592" x2="300" y2="660" stroke="#333" stroke-width="3"/>
  <line x1="360" y1="592" x2="420" y2="660" stroke="#333" stroke-width="3"/>
  <line x1="360" y1="592" x2="330" y2="720" stroke="#333" stroke-width="3"/>
  <line x1="360" y1="592" x2="390" y2="720" stroke="#333" stroke-width="3"/>

  <!-- RESULTATEN -->
  <text x="560" y="545" font-size="20" font-weight="bold">Resultaten</text>
  <text x="560" y="568" font-size="11" fill="#555">(werken ť daden ť vrucht)</text>
  <line x1="412" y1="540" x2="500" y2="540" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="456" y="532" text-anchor="middle" font-size="10" fill="#555">handelen</text>
  <text x="456" y="556" text-anchor="middle" font-size="10" fill="#555">veroorzaakt</text>

  <!-- Feedback loop fallen - Results back to verstand -->
  <path d="M 620 520 Q 680 350 500 240" fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="665" y="380" font-size="10" fill="#c0392b" transform="rotate(70 665 380)">gevallen kringloop</text>
  <text x="530" y="225" font-size="9" fill="#c0392b">resultaten voeden</text>
  <text x="530" y="237" font-size="9" fill="#c0392b">verstand / zintuigen</text>

  <!-- Redeemed path - Woord/Geest -->
  <path d="M 100 118 Q 80 220 200 285" fill="none" stroke="#1e8449" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="55" y="200" font-size="10" fill="#1e8449" transform="rotate(-55 55 200)">Woord Gods</text>
  <text x="75" y="215" font-size="10" fill="#1e8449" transform="rotate(-55 75 215)">scheidt ziel+geest</text>

  <!-- Geest to wil - green -->
  <path d="M 280 155 Q 200 250 280 350" fill="none" stroke="#1e8449" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow-green)"/>
  <text x="175" y="260" font-size="9" fill="#1e8449">Geest regeert</text>

  <!-- Legend box -->
  <rect x="30" y="760" width="660" height="120" rx="8" fill="#f8f9fa" stroke="#ccc"/>
  <text x="50" y="785" font-size="13" font-weight="bold">Twee toestanden (J.O. Smith)</text>
  <circle cx="60" cy="808" r="6" fill="#c0392b"/>
  <text x="75" y="812" font-size="11"><tspan font-weight="bold">Gevallen:</tspan> zintuigen ť verstand (verzoeking) ť wil kiest vlees ť lichaam handelt ť zonde ť terug naar ziel</text>
  <circle cx="60" cy="838" r="6" fill="#1e8449"/>
  <text x="75" y="842" font-size="11"><tspan font-weight="bold">Verlost:</tspan> Woord + Geest vernieuwt geest ť wil dient God ť lichaam onder Geest ť vrucht / overwinning</text>
  <text x="50" y="868" font-size="10" fill="#666">Bron: J.O. Smith  Ziel en geest (1927), De val van de mens, De ziel (psyche) en haar functie</text>
</svg>
